<div id="loginBox">
  <h2>🔐 Connexion</h2>
  <input type="text" id="username" placeholder="Utilisateur">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<div id="dashboard" style="display:none;">
  <h1>🔥 Rov Domotique</h1>
  <p id="role"></p>

  <div class="card">
    <h2>🚪 Portail</h2>
    <p id="gateStatus">Fermé</p>
    <button onclick="openGate()">Ouvrir</button>
    <button onclick="closeGate()">Fermer</button>
  </div>
</div>
